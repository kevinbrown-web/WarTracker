name: Daily War Data Update

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM: ${{ secrets.TELEGRAM }}
          BEEHIIV: ${{ secrets.BEEHIIV }}
          WEATHER: ${{ secrets.WEATHER }}
        run: python update_war_data.py

      - name: Commit updated data
        run: |
          git config user.name  "War Tracker Bot"
          git config user.email "bot@wartracker.auto"
          git fetch origin main
          git reset --soft origin/main
          git add data/
          git diff --staged --quiet || git commit -m "Data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
