name: Daily War Data Update

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  # Also lets you trigger it manually from GitHub with a button click
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_war_data.py

      - name: Commit updated data file
        run: |
          git config user.name  "War Tracker Bot"
          git config user.email "bot@wartracker.auto"
          git add data/war_data.json
          git diff --staged --quiet || git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
